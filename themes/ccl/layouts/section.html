{{ define "main" }}
  <article class="page">
    <div class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
    </div>
    <div class="content">
      {{ .Content }}
    </div>
  </article>

  <div class="post-list">
    {{ range .RegularPagesRecursive }}
      {{ partial "post-card.html" . }}
    {{ else }}
      <p>{{ T "noPosts" }}</p>
    {{ end }}
  </div>
{{ end }}
