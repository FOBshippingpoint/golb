{{ define "main" }}
  <article class="page">
    <div class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
    </div>
    <div class="content">
      {{ .Content }}
    </div>
  </article>

  <section class="post-list" aria-labelledby="recent-posts">
    <h2 class="section-title" id="recent-posts">{{ T "recentPosts" }}</h2>
    {{ range where site.RegularPages "Section" "posts" | first 10 }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </section>
{{ end }}
