{{ define "main" }}
  <article class="page">
    <div class="page-header">
      <h1 class="page-title">{{ .Title }}</h1>
    </div>
    <div class="content">
      {{ .Content }}
    </div>
  </article>

  <ul class="term-list">
    {{ range .Pages }}
      <li class="term"><a class="term-link" href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></li>
    {{ else }}
      <li class="term">{{ T "noTerms" }}</li>
    {{ end }}
  </ul>
{{ end }}
